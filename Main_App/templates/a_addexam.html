{% extends 'admin/a_base.html' %}
{% block content %}
<main class="content">
    <div class="container-fluid p-0">
        <h1 class="h3 mb-3">Add Exam Schedule</h1>
        <div class="row">
            <div class="col-md-12">
                {% if messages %}
                    <div class="alert alert-primary alert-dismissible" role="alert">
                        <button type="button" class="close" data-dismiss="alert">
                            <span aria-hidden="true">&times;</span>
                        </button>
                        <div class="alert-message">
                            <strong>
                            {% for message in messages %}{{message}}{% endfor %}
                            </strong>
                        </div>
                    </div>
                {% endif %}
                <div class="card">
                    <div class="card-body">
                        <form action="/a_saveexam/" method="POST">
                        {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Course</label>
                                <select class="form-control" name="course" required>
                                    <option value="" hidden>--Select Course--</option>
                                    {% for course in courses %}
                                    <option value="{{course.id}}">{{course.code}} - {{course.name}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Exam Type</label>
                                <select class="form-control" name="exam_type" required>
                                    <option value="" hidden>--Select--</option>
                                    <option value="IA1">Internal Assessment 1</option>
                                    <option value="IA2">Internal Assessment 2</option>
                                    <option value="MID">Mid Semester</option>
                                    <option value="END">End Semester</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Exam Date</label>
                                <input type="date" class="form-control" name="exam_date" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Start Time</label>
                                <input type="time" class="form-control" name="start_time" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">End Time</label>
                                <input type="time" class="form-control" name="end_time" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Venue</label>
                                <input type="text" class="form-control" placeholder="e.g. Hall A" name="venue" required>
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="form-control btn btn-primary">Add Exam</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}

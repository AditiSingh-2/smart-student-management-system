{% extends 'admin/a_base.html' %}
{% block content %}
<main class="content">
    <div class="container-fluid p-0">
        <div class="row mb-2 mb-xl-3">
            <div class="col-auto">
                <h3>Update <strong>{{student.admin.first_name}}</strong></h3>
            </div>
            <div class="col-auto ml-auto text-right mt-n1">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb bg-transparent p-0 mt-1 mb-0">
                        <li class="breadcrumb-item"><a href="/adminhome/">Dashboard</a></li>
                    </ol>
                </nav>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                {% if messages %}
                    <div class="alert alert-primary alert-dismissible" role="alert">
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                        <div class="alert-icon">
                            <i data-feather="send"></i>
                        </div>
                        <div class="alert-message">
                            <strong>
                            {% for message in messages %}
                            {{message}}
                            {% endfor %}
                            </strong>
                        </div>
                    </div>
                {% endif %}
                <div class="card">
                    <div class="card-body">
                        <form action="/saveeditstudent/" method="POST">
                        {% csrf_token %}
                            <input type="hidden" value="{{student.admin.id}}" name="student_id">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="Email" name="email" value="{{student.admin.email}}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="First Name" name="firstname" value="{{student.admin.first_name}}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Last Name" name="lastname" value="{{student.admin.last_name}}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Roll Number</label>
                                <input type="text" class="form-control" placeholder="Roll Number" name="roll_number" value="{{student.roll_number}}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" class="form-control" placeholder="Phone Number" name="phone" value="{{student.phone}}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="department">Department</label>
                                <select id="department" class="form-control" name="department">
                                    <option value="{{student.department}}" hidden selected>{{student.get_department_display}}</option>
                                    {% for k,v in departments %}
                                    <option value={{k}}>{{v}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="year">Year</label>
                                <select id="year" class="form-control" name="year">
                                    <option value="{{student.year}}" hidden selected>{{student.get_year_display}}</option>
                                    {% for k,v in years %}
                                    <option value={{k}}>{{v}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Section</label>
                                <input type="text" class="form-control" placeholder="Section (e.g. A)" name="section" value="{{student.section}}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="gender">Gender</label>
                                <select id="gender" class="form-control" name="gender">
                                    <option value="{{student.gender}}" hidden selected>{{student.gender}}</option>
                                    {% for k,v in student.GENDER_CHOICES %}
                                    <option value={{k}}>{{v}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" placeholder="Address" name="address" value="{{student.address}}">
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="form-control btn btn-primary">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}

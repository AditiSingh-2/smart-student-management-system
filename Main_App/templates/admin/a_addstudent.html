{% extends 'admin/a_base.html' %}
{% block content %}
<main class="content">
    <div class="container-fluid p-0">
        <h1 class="h3 mb-3">Add Student</h1>
        <div class="row">
            <div class="col-md-12">
                {% if messages %}
                    <div class="alert alert-primary alert-dismissible" role="alert">
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                        <div class="alert-icon">
                            <i data-feather="send"></i>
                        </div>
                        <div class="alert-message">
                            <strong>
                            {% for message in messages %}
                            {{message}}
                            {% endfor %}
                            </strong>
                        </div>
                    </div>
                {% endif %}
                <div class="card">
                    <div class="card-body">
                        <form action="/savestudent/" method="POST">
                        {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="Email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="First Name" name="firstname" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Last Name" name="lastname" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Roll Number</label>
                                <input type="text" class="form-control" placeholder="Roll Number" name="roll_number" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" class="form-control" placeholder="Phone Number" name="phone">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="department">Department</label>
                                <select id="department" class="form-control" name="department" required>
                                    <option value="" selected hidden>--Select--</option>
                                    {% for k,v in departments %}
                                    <option value={{k}}>{{v}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="year">Year</label>
                                <select id="year" class="form-control" name="year" required>
                                    <option value="" selected hidden>--Select--</option>
                                    {% for k,v in years %}
                                    <option value={{k}}>{{v}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Section</label>
                                <input type="text" class="form-control" placeholder="Section (e.g. A)" name="section">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="gender">Gender</label>
                                <select id="gender" class="form-control" name="gender" required>
                                    <option value="" selected hidden>--Select--</option>
                                    {% for k,v in genders %}
                                    <option value={{k}}>{{v}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" placeholder="Address" name="address">
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="form-control btn btn-primary">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
